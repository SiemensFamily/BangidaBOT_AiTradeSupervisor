# Live trading overrides — more conservative than paper
[general]
mode = "live"

[risk]
max_risk_per_trade_pct = 2.0      # Reduced risk for real money
max_daily_loss_pct = 7.0
max_drawdown_pct = 20.0
max_consecutive_losses = 2        # Tighter halt trigger
cooldown_minutes = 30             # Longer cooldown
max_trades_per_hour = 10
