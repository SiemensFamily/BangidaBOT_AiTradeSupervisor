[account]
initial_capital = 200.0

[risk]
max_risk_per_trade = 0.012
daily_drawdown_limit = 0.12
max_consecutive_losses = 10
max_daily_loss_pct = 10.0
max_drawdown_pct = 25.0
min_equity = 25.0
max_trades_per_hour = 45
cooldown_minutes = 15
max_risk_per_trade_pct = 0.5
max_leverage = 20
max_open_positions = 1

[execution]
post_only = true
max_slippage_bps = 5

[strategy]
ensemble_threshold = 0.25
min_confluence_score = 0.4
min_agreeing_strategies = 2

[strategy.ensemble]
min_strength_threshold = 0.48
min_atr_ratio = 0.0015
min_consensus = 2

[strategy.momentum]
enabled = true
volume_spike_multiplier = 2.0
rsi_overbought = 77.73383940601788
rsi_oversold = 21.78789578199577
take_profit_pct = 0.5
stop_loss_pct = 0.25
weight = 0.4
trailing_stop_pct = 0.2

[strategy.ob_imbalance]
enabled = true
min_imbalance_ratio = 0.25
imbalance_threshold = 0.7
take_profit_ticks = 62
stop_loss_ticks = 16
weight = 0.25

[strategy.liquidation_wick]
enabled = true
volume_spike_multiplier = 3.0
price_velocity_threshold = 1.0
take_profit_pct = 0.8
stop_loss_pct = 0.4
weight = 0.2

[strategy.funding_bias]
enabled = true
funding_threshold = 0.05
strength_boost = 0.1
weight = 0.15

[strategy.supertrend]
enabled = true
period = 10
multiplier = 3.0

[strategy.ema_pullback]
enabled = true
fast_period = 8
slow_period = 18
min_pullback_strength = 0.6

[strategy.mean_reversion]
enabled = true
bb_penetration = 0.05
rsi_oversold = 30.0
rsi_overbought = 70.0
max_adx = 25.0
atr_tp_multiplier = 1.5
atr_sl_multiplier = 1.0
weight = 0.2

[strategy.donchian]
enabled = true
entry_period = 20
use_trend_filter = false
atr_tp_multiplier = 4.0
atr_stop_multiplier = 2.0
weight = 0.3
exit_period = 10

[strategy.ma_cross]
enabled = true
fast_period = 21
slow_period = 50
min_spread_pct = 0.005
atr_tp_multiplier = 3.0
atr_stop_multiplier = 1.5
weight = 0.3

[strategy.cvd_divergence]
enabled = true
min_divergence_strength = 0.65
weight = 0.2

[strategy.volume_profile]
enabled = false
poc_lookback_bars = 50
weight = 0.15

[strategy.rsi_fvg]
enabled = true
rsi_overbought = 70.0
rsi_oversold = 30.0
weight = 0.2

[strategy.session_retrace]
enabled = false
weight = 0.15

[logging]
level = "debug"
console = true
file_enabled = true
file_path = "logs/bangida_bot.log"
performance_log = "logs/performance_tracker.log"
trade_log = "logs/trades.log"
supervisor_log = "logs/ai_supervisor.log"
performance_summary_interval = 60
rotate_daily = true
max_file_size_mb = 10

[trading]
symbols = [
    "BTCUSDT",
    "ETHUSDT",
    "DOGEUSDT",
]
default_leverage = 10
max_leverage = 20
