[general]
mode = "paper"

[exchanges.binance]
api_key = ""
api_secret = ""
base_url_rest = "https://testnet.binancefuture.com"
base_url_ws = ""
testnet = true

[exchanges.binance.symbol_map]
BTCUSDT = "BTCUSDT"
ETHUSDT = "ETHUSDT"

[exchanges.bybit]
api_key = ""
api_secret = ""
base_url_rest = "https://api-testnet.bybit.com"
base_url_ws = ""
testnet = true

[exchanges.bybit.symbol_map]
ETHUSDT = "ETHUSDT"
BTCUSDT = "BTCUSDT"

[exchanges.okx]
api_key = ""
api_secret = ""
passphrase = ""
base_url_rest = "https://www.okx.com"
base_url_ws = ""
testnet = false

[exchanges.kraken]
api_key = ""
api_secret = ""
base_url_rest = "https://futures.kraken.com"
base_url_ws = "wss://futures.kraken.com/ws/v1"
testnet = false

[exchanges.kraken.symbol_map]
ETHUSDT = "PI_ETHUSD"
BTCUSDT = "PI_XBTUSD"

[trading]
symbols = [
    "BTCUSDT",
    "ETHUSDT",
]
default_leverage = 10
max_leverage = 20

[risk]
max_risk_per_trade_pct = 2.0
max_daily_loss_pct = 10.0
max_drawdown_pct = 25.0
max_consecutive_losses = 10
cooldown_minutes = 15
min_equity = 25.0
max_open_positions = 1
max_trades_per_hour = 30
max_leverage = 20

[strategy]
ensemble_threshold = 0.25

[strategy.momentum]
enabled = true
weight = 0.4
volume_spike_multiplier = 2.0
take_profit_pct = 0.5
stop_loss_pct = 0.25
trailing_stop_pct = 0.2
rsi_overbought = 80.0
rsi_oversold = 20.0

[strategy.ob_imbalance]
enabled = true
weight = 0.25
imbalance_threshold = 0.7
take_profit_ticks = 17
stop_loss_ticks = 3

[strategy.liquidation_wick]
enabled = false
weight = 0.2
price_velocity_threshold = 1.0
volume_spike_multiplier = 3.0
take_profit_pct = 0.8
stop_loss_pct = 0.4

[strategy.funding_bias]
enabled = false
weight = 0.15
funding_threshold = 0.05
strength_boost = 0.1

[strategy.mean_reversion]
enabled = false
weight = 0.2
rsi_oversold = 30.0
rsi_overbought = 70.0
bb_penetration = 0.05
atr_tp_multiplier = 1.5
atr_sl_multiplier = 1.0
max_adx = 25.0

[strategy.donchian]
enabled = false
weight = 0.3
entry_period = 20
exit_period = 10
atr_tp_multiplier = 4.0
atr_stop_multiplier = 2.0
use_trend_filter = false

[strategy.ma_cross]
enabled = false
weight = 0.3
fast_period = 21
slow_period = 50
min_spread_pct = 0.005
atr_tp_multiplier = 3.0
atr_stop_multiplier = 1.5
