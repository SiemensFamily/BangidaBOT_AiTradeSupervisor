# OKX — best for $100 accounts ($1 minimum order, -0.025% maker rebate)
[exchanges.okx]
api_key = ""
api_secret = ""
passphrase = ""
base_url_rest = "https://www.okx.com"
base_url_ws = ""
testnet = false

# Kraken Futures
[exchanges.kraken]
api_key = ""
api_secret = ""
base_url_rest = "https://futures.kraken.com"
base_url_ws = "wss://futures.kraken.com/ws/v1"
testnet = false

[exchanges.kraken.symbol_map]
BTCUSDT = "PI_XBTUSD"
ETHUSDT = "PI_ETHUSD"

[trading]
symbols = ["BTCUSDT", "ETHUSDT"]
default_leverage = 10
max_leverage = 20

# Risk management — tuned for $100 starting capital
[risk]
max_risk_per_trade_pct = 3.0      # $3 risk per trade on $100
max_daily_loss_pct = 10.0         # $10 max daily loss
max_drawdown_pct = 25.0           # 25% peak drawdown limit
max_consecutive_losses = 3        # 3 losses = 15min cooldown
cooldown_minutes = 15             # Short recovery for rapid growth
min_equity = 25.0                 # Hard floor — stop trading at $25
max_open_positions = 1            # One trade at a time (capital constraint)
max_trades_per_hour = 15          # Controlled frequency
max_leverage = 20                 # Up to 20x

# Strategy configuration
[strategy]
ensemble_threshold = 0.20         # Minimum weighted strength to emit signal

[strategy.momentum]
enabled = true
weight = 0.40                     # PRIMARY strategy
volume_spike_multiplier = 2.5
take_profit_pct = 0.50            # 0.50% TP
stop_loss_pct = 0.25              # 0.25% SL (2:1 R:R)
trailing_stop_pct = 0.20
rsi_overbought = 80.0
rsi_oversold = 20.0

[strategy.ob_imbalance]
enabled = true
weight = 0.25                     # SECONDARY strategy
imbalance_threshold = 0.30        # Require 30% imbalance
take_profit_ticks = 3
stop_loss_ticks = 2

[strategy.liquidation_wick]
enabled = true
weight = 0.20                     # Reversal strategy
price_velocity_threshold = 1.0    # 1% move in 30s
volume_spike_multiplier = 3.0     # 3x avg liquidation volume
take_profit_pct = 0.80
stop_loss_pct = 0.40

[strategy.funding_bias]
enabled = true
weight = 0.15                     # SUPPLEMENTARY
funding_threshold = 0.05          # 5% funding rate
strength_boost = 0.10             # +0.1 signal boost
