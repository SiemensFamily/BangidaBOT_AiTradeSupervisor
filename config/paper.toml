# Paper trading overrides — uses testnet endpoints
# Note: base_url_ws intentionally left empty for Binance/Bybit to prevent
# unwanted connections. Only Kraken WS is configured in default.toml.
[general]
mode = "paper"

[exchanges.binance]
base_url_rest = "https://testnet.binancefuture.com"
base_url_ws = ""
testnet = true

[exchanges.bybit]
base_url_rest = "https://api-testnet.bybit.com"
base_url_ws = ""
testnet = true

[account]
initial_capital = 100.0

[risk]
max_risk_per_trade_pct = 0.4      # Lowered a bit more
daily_loss_limit_pct = 1.5        # Tighter daily protection

[strategy]
min_confluence_score = 0.40
min_agreeing_strategies = 2