version: "3.8"
services:
  bot:
    build: .
    environment:
      - BANGIDA__GENERAL__MODE=paper
      - BANGIDA__EXCHANGES__BINANCE__API_KEY=${BINANCE_API_KEY}
      - BANGIDA__EXCHANGES__BINANCE__API_SECRET=${BINANCE_API_SECRET}
      - BANGIDA__EXCHANGES__BYBIT__API_KEY=${BYBIT_API_KEY}
      - BANGIDA__EXCHANGES__BYBIT__API_SECRET=${BYBIT_API_SECRET}
      - RUST_LOG=info
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
