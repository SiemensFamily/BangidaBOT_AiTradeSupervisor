services:
  crypto-scalper:
    build: .
    container_name: crypto-scalper
    environment:
      - SCALPER__GENERAL__MODE=${SCALPER_MODE:-paper}
      - SCALPER__EXCHANGES__BINANCE__API_KEY=${BINANCE_API_KEY}
      - SCALPER__EXCHANGES__BINANCE__API_SECRET=${BINANCE_API_SECRET}
      - SCALPER__EXCHANGES__BYBIT__API_KEY=${BYBIT_API_KEY}
      - SCALPER__EXCHANGES__BYBIT__API_SECRET=${BYBIT_API_SECRET}
      - SCALPER__EXCHANGES__OKX__API_KEY=${OKX_API_KEY}
      - SCALPER__EXCHANGES__OKX__API_SECRET=${OKX_API_SECRET}
      - SCALPER__EXCHANGES__OKX__PASSPHRASE=${OKX_PASSPHRASE}
      - SCALPER__EXCHANGES__KRAKEN__API_KEY=${KRAKEN_API_KEY}
      - SCALPER__EXCHANGES__KRAKEN__API_SECRET=${KRAKEN_API_SECRET}
      - RUST_LOG=info
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
